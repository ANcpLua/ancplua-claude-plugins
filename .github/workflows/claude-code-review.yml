name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'dependabot[bot],renovate[bot]'

          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            This is a Claude Code plugin marketplace (skills, hooks, agents, commands).
            No C# or .NET code — only markdown, YAML, JSON, and shell scripts.

            Check:
            1. plugin.json — valid schema, version bumped if plugin code changed
            2. SKILL.md — has name + description frontmatter, workflows are concrete
            3. hooks.json — correct event types, matchers, timeouts
            4. Shell scripts — no unquoted variables, proper error handling
            5. CHANGELOG.md — entry under [Unreleased] for non-trivial changes
            6. No hardcoded absolute paths, no leaked secrets, no stale references

            **Review-fix loop:** If you find fixable issues, fix them directly and push.
            If you pushed fixes, summarize what you changed in a PR comment.
            If everything looks good, approve the PR.
            Skip nitpicks — only fix things that matter.
