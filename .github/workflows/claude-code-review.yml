name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            This is a Claude Code plugin marketplace (skills, hooks, agents, commands).
            No C# or .NET code — only markdown, YAML, JSON, and shell scripts.

            Check:
            1. plugin.json — valid schema, version bumped if plugin code changed
            2. SKILL.md — has name + description frontmatter, workflows are concrete
            3. hooks.json — correct event types, matchers, timeouts
            4. Shell scripts — no unquoted variables, proper error handling
            5. CHANGELOG.md — entry under [Unreleased] for non-trivial changes
            6. No hardcoded absolute paths, no leaked secrets, no stale references

            Use gh pr diff to read changes. Post a single summary comment via gh pr comment.
            Use inline comments (with confirmed: true) only for specific issues worth fixing.
            Skip nitpicks. If everything looks good, say so in one sentence.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

