name: Guards

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guards:
    name: Marketplace guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # version-bump guard diffs against the PR base

      - name: Run guards
        run: bash .github/scripts/guards.sh "origin/${{ github.base_ref }}"
