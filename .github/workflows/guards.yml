name: Guards

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guards:
    name: Marketplace guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # version-bump guard diffs against the PR base

      - name: Run guards
        run: bash .github/scripts/guards.sh "origin/${{ github.base_ref }}"
