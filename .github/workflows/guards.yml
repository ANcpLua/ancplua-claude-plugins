name: Guards

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guards:
    name: Marketplace guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # version-bump guard diffs against the PR base

      - name: Run guards
        run: bash .github/scripts/guards.sh "origin/${{ github.base_ref }}"
