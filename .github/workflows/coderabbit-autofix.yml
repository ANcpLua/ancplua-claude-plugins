name: CodeRabbit Autofix Trigger

# Eliminates the manual "Push a commit to this branch (recommended)" checkbox
# by auto-commenting `@coderabbitai autofix` on every PR open/sync.
# CodeRabbit then pushes its fix as a commit, no human click needed.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  trigger:
    # Skip when we shouldn't be the one driving:
    # - bot-authored PRs (dependabot/renovate already minimal-diff)
    # - CodeRabbit's own pushes (loop prevention)
    # - explicit opt-out via skip-autofix label
    if: |
      github.actor != 'coderabbitai[bot]' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'renovate[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-autofix')
    concurrency:
      group: coderabbit-autofix-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment "@coderabbitai autofix"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '@coderabbitai autofix'
            });
