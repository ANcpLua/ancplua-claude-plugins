# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for the ancplua-claude-plugins marketplace.
#
# Base: the cc-triad-relay harness template — a Claude / Copilot / CodeRabbit
# "triad" review setup for Claude Code repos — tuned for this repo: markdown
# skills, JS + Python + shell plugin tooling, plugin.json manifests, and
# PreToolUse / Stop hooks. Static-analysis tools (shellcheck, markdownlint-cli2,
# ruff, eslint, yamllint, actionlint, gitleaks, …) are on by CodeRabbit's
# defaults, so they are not re-listed here.
#
# Docs:   https://docs.coderabbit.ai/getting-started/configure-coderabbit
# Schema: https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
tone_instructions: "Be direct and constructive. Prioritize bugs, security issues, and fail-open or always-pass logic over style nits."

reviews:
  profile: "chill"               # actionable-only (CodeRabbit's default)
  # Advisory only — CodeRabbit never blocks a merge ("keine rules die was
  # verbieten", 2026-06-11).
  request_changes_workflow: false
  high_level_summary: true
  changed_files_summary: true
  sequence_diagrams: false
  poem: false
  auto_review:
    enabled: true
    drafts: false
    ignore_usernames:
      - dependabot[bot]
      - renovate[bot]
    base_branches:               # regex, not glob
      - "^main$"
  path_filters:
    - "!**/*.lock"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/node_modules/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!plugins/cc-plugin-eval/fixtures/**"   # test scaffolding, not shipped
  path_instructions:
    - path: "plugins/*/skills/**/SKILL.md"
      instructions: |
        Skill definitions. The `description` frontmatter is the ONLY trigger mechanism — check it
        encodes WHEN to use the skill (concrete "use when" phrasing), stays under the ~1024-char
        cap, and has no unquoted plain-scalar colon-space that would break YAML frontmatter.
        Quoted descriptions may contain colon-space and must not be flagged for that alone. Flag
        task-style skills (long imperative numbered lists, no trigger) that should set
        disable-model-invocation.
    - path: "plugins/*/hooks/**"
      instructions: |
        PreToolUse / Stop hooks. Flag any guard or validator that FAIL-OPENS or always-passes while
        presenting as protection, and any detection / regex that cannot match what it claims to
        catch. Hooks must fail SAFE (allow the stop, never silently abort) and branch exhaustively
        on their inputs.
    - path: "plugins/*/scripts/**"
      instructions: |
        Hook implementation scripts and plugin helper scripts. When a hooks.json file invokes a
        script from this tree, review it with the same guard quality bar as files under hooks/:
        no fail-open validators, no always-pass protection, and no detection / regex that cannot
        match what it claims to catch.
    - path: "plugins/*/bin/**"
      instructions: |
        Executable plugin entrypoints, including extensionless shell scripts. If the file has a
        shell shebang, apply shell-script review guidance even when it does not end in .sh or .bash.
        For guard scripts, also check fail-open behavior and unmatchable detection / regex claims.
    - path: "**/*.{sh,bash}"
      instructions: |
        Shell scripts. First read the active strict mode (`set -e`, `set -u`, and/or `pipefail`);
        only apply abort-risk findings that follow from the actual mode. For strict scripts, flag
        command substitutions that can abort on a non-match (e.g. unguarded `grep` in `$(...)`),
        unquoted expansions, and missing `|| true` / default-value guards.
    - path: "**/.claude-plugin/plugin.json"
      instructions: |
        Plugin manifest. Verify `name` is kebab-case and `version` is valid SemVer, and that the
        version matches this plugin's entry in /.claude-plugin/marketplace.json — the two must stay
        in sync.
    - path: ".claude-plugin/marketplace.json"
      instructions: |
        Marketplace manifest. For every edited plugin entry, verify its `version` matches the
        corresponding `plugins/<name>/.claude-plugin/plugin.json` version and its `source` points at
        an existing plugin directory. Marketplace-only version edits can desynchronize releases, so
        check them even when no plugin.json is in the diff.

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
