# .tome/tome.yaml — TomeVault manifest (tome-spec-draft-01)
#
# CLAUDE.md is the canonical, hand-maintained agent operating guide for this repo.
# The former AGENTS.md render-source model was retired in #289 (root-authority
# cleanup) — AGENTS.md and GEMINI.md were deleted, and no TomeVault renderer is
# installed — so every agent-config file below is hand-maintained and shipped
# verbatim (no rendering). .github/copilot-instructions.md is a separate manual.
manifest:
  schema_version: tome-spec-draft-01
  id: ANcpLua/ancplua-claude-plugins
  name: ancplua-claude-plugins
  version: 0.1.0
  authors:
    - name: Alexander Nachtmann
      handle: ANcpLua
      url: https://github.com/ANcpLua
  license: MIT
  created_at: 2026-06-04T00:00:00Z
  updated_at: 2026-06-09T00:00:00Z

includes:
  configs:
    - path: CLAUDE.md
      kind: claude-md
    - path: .github/copilot-instructions.md
      kind: copilot-instructions
    - path: .cursor/rules/project-config.mdc
      kind: cursor-rules
    - path: .windsurf/rules/project-config.md
      kind: windsurf-rules

targets:
  # Every file is its own source, shipped verbatim (no renderer is installed).
  - format: claude-md
    output: CLAUDE.md
    source:
      type: include
      ref: "configs[0]"
  - format: copilot-instructions
    output: .github/copilot-instructions.md
    source:
      type: include
      ref: "configs[1]"
  - format: cursor-rules
    output: .cursor/rules/project-config.mdc
    source:
      type: include
      ref: "configs[2]"
  - format: windsurf-rules
    output: .windsurf/rules/project-config.md
    source:
      type: include
      ref: "configs[3]"

# security: omitted → strict default (scan required, no permissions, ruleset @latest)
