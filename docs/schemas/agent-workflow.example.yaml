    - preserve current session context
    - inspect source and repo constraints
    - assign scoped implementation domains
    - integrate subagent output
    - run final verification before reporting

constraints:
  no_git_reset: true
  protect_user_changes: true
  source_only_when_requested: true
  no_package_refs_when_copying_source: true
  no_dotnet_test_without_request: true
  verification_before_reporting: true
  final_response_contract: End the response with the required remaining-work line when active developer instructions require it.

roles:
  - role: root_coordinator
    purpose: Coordinate, integrate, verify, and report without losing the main task context.
    may_edit: true
    terminal_statuses:
      - closed
      - blocked
  - role: team_planner
    purpose: Convert ambiguous request into exact scope, assumptions, risks, and ordered tasks.
    may_edit: false
    terminal_statuses:
      - done
      - done_with_concerns
      - blocked
  - role: team_implementer
    purpose: Implement one scoped task or independent problem domain and run focused validation.
    may_edit: true
    terminal_statuses:
      - done
      - done_with_concerns
      - needs_context
      - blocked
  - role: team_reviewer
    purpose: Verify exact spec compliance before quality review.
    may_edit: false
    terminal_statuses:
      - approved
      - rejected
      - blocked
  - role: team_improver
    purpose: Verify correctness, maintainability, security, tests, duplication, and brittle abstractions.
    may_edit: false
    terminal_statuses:
      - approved
      - rejected
      - blocked

gates:
  - id: plan_scope
    order: 1
    owner_role: team_planner
    pass_status: done
    fail_statuses:
      - blocked
  - id: implementation_self_review
    order: 2
    owner_role: team_implementer
    pass_status: done
    fail_statuses:
      - done_with_concerns
      - needs_context
      - blocked
    required_before:
      - spec_review
  - id: spec_review
    order: 3
    owner_role: team_reviewer
    pass_status: approved
    fail_statuses:
      - rejected
      - blocked
    required_before:
      - quality_review
  - id: quality_review
    order: 4
    owner_role: team_improver
    pass_status: approved
    fail_statuses:
      - rejected
      - blocked
    required_before:
      - final_validation
  - id: final_validation
    order: 5
    owner_role: root_coordinator
    pass_status: passed
    fail_statuses:
      - failed

tasks:
